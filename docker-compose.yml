services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spacepad
      POSTGRES_PASSWORD: spacepad
      POSTGRES_DB: spacepad
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spacepad"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible) — used starting Phase 3. Defined now so infra is stable.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: spacepad
      MINIO_ROOT_PASSWORD: spacepadsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ClamAV malware scanner — Phase 3. Optional/heavy (~1GB virus DB), so it's
  # behind the "scan" profile and off by default. Without it, the scan service
  # fails closed (uploads marked failed, never served). Enable with:
  #   docker compose --profile scan up -d clamav
  # and set CLAMAV_ENABLED=true in the backend .env.
  clamav:
    image: clamav/clamav:latest
    profiles: ["scan"]
    ports:
      - "3310:3310"
    volumes:
      - clamavdb:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  pgdata:
  miniodata:
  clamavdb:
