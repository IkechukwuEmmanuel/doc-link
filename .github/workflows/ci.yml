name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + tests + migration state)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: . .venv/bin/activate && ruff check .
      - name: Single Alembic head
        # Catches the unmerged-branch problem that caused AUDIT B1/B2: more than
        # one head means `alembic upgrade head` is ambiguous.
        run: |
          . .venv/bin/activate
          heads=$(alembic heads | grep -c '(head)')
          echo "alembic heads: $heads"
          test "$heads" -eq 1
      - name: Tests (pytest)
        run: . .venv/bin/activate && pytest -q

  migrations:
    name: Migration dry-run (real Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spacepad
          POSTGRES_PASSWORD: spacepad
          POSTGRES_DB: spacepad_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spacepad"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      # Direct (non-pooled) connection — migrations always use the direct endpoint.
      DATABASE_URL_DIRECT: postgresql+asyncpg://spacepad:spacepad@localhost:5432/spacepad_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Apply migrations to a throwaway DB
        # Proves the migration graph applies cleanly against real Postgres before it
        # ever reaches production — would have surfaced the live-schema drift the
        # audit found manually. Round-trips down to base and back up too.
        run: |
          . .venv/bin/activate
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck + build
        run: npm run build  # tsc -b && vite build
